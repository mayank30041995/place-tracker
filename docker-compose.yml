services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build: ./client
    container_name: frontend
    ports:
      - "3000:80"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"d 
    depends_on:
      - frontend
      - backend
    restart: always
