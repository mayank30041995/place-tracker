services:
  backend:
    build:
      context: .
    container_name: backend
    ports:
      - "5000:5000"
    restart: always
    env_file:
      - .env

  frontend:
    build:
      context: ./client
    container_name: frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
