version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/node:14.21

    working_directory: ~/project

    steps:
      - checkout

      # Install backend dependencies
      - run:
          name: Install Backend Dependencies
          command: npm install

      # Install frontend dependencies
      - run:
          name: Install Frontend Dependencies
          command: |
            cd client
            npm install

      # Build frontend
      - run:
          name: Build Frontend
          command: |
            cd client
            npm run build

workflows:
  version: 2

  build-workflow:
    jobs:
      - build-and-test
