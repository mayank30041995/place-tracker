version: 2.1

jobs:
  deploy:
    docker:
      - image: cimg/node:18.17

    working_directory: ~/repo

    steps:
      - checkout

      # Optional frontend build check (safe CI validation)
      - run:
          name: Install & Build Frontend (CI check)
          command: |
            cd client
            npm install --legacy-peer-deps
            CI=false npm run build

      # Deploy to EC2 (REAL FIXED PART)
      - run:
          name: Deploy to EC2
          command: |
            echo "$SSH_KEY" > key.pem
            chmod 600 key.pem

            ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@63.180.236.1 << 'EOF'

              set -e

              cd ~/place-tracker

              echo "➡ Pull latest code"
              git fetch origin
              git reset --hard origin/main

              echo "➡ Stop old stack safely"
              docker compose down --remove-orphans || true

              echo "➡ Remove stuck containers (IMPORTANT FIX)"
              docker rm -f backend frontend nginx || true

              echo "➡ Remove old network (fixes 'already exists')"
              docker network prune -f || true

              echo "➡ Rebuild clean images (FIX FOR 'image already exists')"
              docker compose build --no-cache --pull

              echo "➡ Start fresh deployment"
              docker compose up -d --force-recreate --remove-orphans

              echo "✅ Deployment complete"

            EOF

workflows:
  deploy-workflow:
    jobs:
      - deploy
