version: 2.1

jobs:
  deploy:
    machine: true

    steps:
      - checkout

      - add_ssh_keys

      - run:
          name: Deploy to EC2
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP "
              cd ~/place-tracker &&
              git pull origin main &&
              docker-compose down &&
              docker-compose up -d --build
            "

workflows:
  version: 2

  deploy_pipeline:
    jobs:
      - deploy
